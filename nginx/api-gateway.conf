server {
    listen 80;
    server_name _;

    # Proxy all /api/ requests to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Allow large request bodies (QR image responses)
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Health check endpoint
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Everything else is not served here (frontend is on Vercel/Cloudflare)
    location / {
        return 404 "Frontend is hosted on Vercel/Cloudflare Pages\n";
        add_header Content-Type text/plain;
    }
}
