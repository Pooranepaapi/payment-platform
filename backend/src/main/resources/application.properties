# Application Configuration
spring.application.name=payment-backend
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_gateway
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.personal=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Jackson Configuration
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# UPI Configuration
app.upi.callback-validity-minutes=15
app.base-url=http://localhost:8080

# API Versioning
api.version=v1

# QR Code Configuration (Phase-1)
qr.expiry.minutes=15
qr.size.pixels=400
qr.enabled=true

# PSP Configuration (Mock Bank)
psp.mock.enabled=true
psp.mock.success.probability=0.85
psp.mock.approval.delay.seconds=2

# Simulator Configuration
simulator.base-url=http://localhost:8181
simulator.enabled=true
